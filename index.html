<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La melodía de π</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🎵 La melodía de π</h1>

  <!-- CUENTA ATRÁS -->
  <div class="countdown">
    <span id="dias">0</span>d
    <span id="horas">00</span>h
    <span id="minutos">00</span>m
    <span id="segundos">00</span>s
  </div>

  <!-- PANTALLAS -->
  <div class="pantallas">

    <div class="pantalla principal">
      <div id="estadoPrincipal">🎵 Esperando inicio...</div>
      <div id="lugarPrincipal"></div>
    </div>

    <div class="pantalla secundaria">
      <div class="lugar">⏳ Próximo intérprete</div>
    </div>

  </div>

  <!-- PENTAGRAMA -->
  <div class="pentagrama-section">
    <div id="notasPentagrama"></div>
  </div>

  <div class="pentagrama-lineas">
  <div></div><div></div><div></div><div></div><div></div>
</div>
<div id="notasPentagrama"></div>

  <!-- TIEMPO -->
  <div id="tiempoActual"></div>

  <!-- BOTONES -->
  <div id="controles"></div>

</div>

<script src="script.js"></script>
</body>
</html>
