<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscríbete - La melodía de π</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  background:#0a0c10;
  color:#eef3f9;
  font-family:'Inter',sans-serif;
  padding:40px 20px;
}
.container {
  max-width:700px;
  margin:auto;
  background:#0f141c;
  padding:40px;
  border-radius:12px;
  border:1px solid #2a3a4a;
}
h1 { text-align:center; color:#ffd966; }

input, textarea {
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:20px;
  background:#1a1f2a;
  border:1px solid #3a4a5a;
  color:white;
  border-radius:8px;
}

button {
  width:100%;
  padding:14px;
  background:#ffd966;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>📝 Inscripción</h1>

<input placeholder="Nombre">
<input placeholder="Email">
<textarea placeholder="Instrumento / notas"></textarea>

<button onclick="alert('Inscripción registrada (modo local)')">
Enviar
</button>

</div>

</body>
</html>
